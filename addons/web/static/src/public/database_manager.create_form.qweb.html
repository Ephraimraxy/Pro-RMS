<t>
    <!-- Step 1: Security -->
    <div class="rms-step active" data-step="1">
        <h4 class="mb-3">Security Check</h4>
        <t t-call="master_input" />
        <div class="mt-4">
            <button type="button" class="btn btn-primary w-100 next-step">Continue to Project Details</button>
        </div>
    </div>

    <!-- Step 2: Project Details -->
    <div class="rms-step" data-step="2">
        <h4 class="mb-3">Project Details</h4>
        <div class="mb-3">
            <label for="dbname" class="form-label">RMS Project Name</label>
            <input id="dbname" type="text" name="name" class="form-control" placeholder="e.g. My-Business-App" required="required" autocomplete="off" t-att-pattern="pattern" title="Only alphanumerical characters, underscore, hyphen and dot are allowed"/>
        </div>
        <div class="mb-3">
            <label class="form-label d-block">Initialization Mode</label>
            <div class="form-check form-switch p-0 ps-5 mt-2">
                <input class="form-check-input ms-n5" type="checkbox" id="load_demo_checkbox" name="demo" value="1" />
                <label class="form-check-label ms-3" for="load_demo_checkbox">Install Demo Data (for testing)</label>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary flex-grow-1 prev-step">Back</button>
            <button type="button" class="btn btn-primary flex-grow-2 next-step">Next: Account Setup</button>
        </div>
    </div>

    <!-- Step 3: Account Credentials -->
    <div class="rms-step" data-step="3">
        <h4 class="mb-3">Account Credentials</h4>
        <div class="row g-3">
            <div class="col-12">
                <label for="login" class="form-label">Admin Email</label>
                <input id="login" type="email" name="login" class="form-control" placeholder="admin@rms.local" required="required" autocomplete="off"/>
            </div>
            <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input id="password" type="password" name="password" class="form-control" required="required" autocomplete="off"/>
                    <span class="fa fa-eye o_little_eye input-group-text bg-transparent" aria-hidden="true" style="cursor: pointer;"></span>
                </div>
            </div>
            <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number</label>
                <input id="phone" type="tel" name="phone" class="form-control" placeholder="+1..." autocomplete="off"/>
            </div>
            <div class="col-md-6">
                <label for="lang" class="form-label">Language</label>
                <select id="lang" name="lang" class="form-select" required="required">
                    <t t-foreach="langs" t-as="lang">
                        <option t-att-selected="lang[0] == 'en_US'" t-att-value="lang[0]" t-out="lang[1]"/>
                    </t>
                </select>
            </div>
            <div class="col-md-6">
                <label for="country" class="form-label">Country</label>
                <select id="country" name="country_code" class="form-select">
                    <option value="">Select Country</option>
                    <t t-foreach="countries" t-as="country">
                        <option t-att-value="country[0]" t-out="country[1]"/>
                    </t>
                </select>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary flex-grow-1 prev-step">Back</button>
            <button type="button" class="btn btn-primary flex-grow-2 trigger-submit">Finalize &amp; Launch</button>
        </div>
    </div>
</t>
